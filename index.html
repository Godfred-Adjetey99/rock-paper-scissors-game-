<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Rock Paper Scissors</h1>

    <div>
        <button onclick="playGame('rock')" title="Rock"><img src="Image/rock.png" alt=""></button>

        <button onclick="playGame('paper')" title="Paper"><img src="Image/paper.png" alt="Paper"></button>

        <button onclick="playGame('scissors')" title="Scissors"><img src="Image/scissors.png" alt="Scissors"></button>
    </div>

    <p id="result">You Win</p>
    <p id="moves"></p>
    <p id="scores"></p>

    <div class="buttons">
        <button onclick="resetGame()" title="Reset Game" class="reset">Reset Game</button>
        <button onclick="autoPlay()" title="Auto Play" class="autoPlay">Auto Play</button>
    </div>








    <script src="app.js"></script>
</body>

</html>
