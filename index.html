<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Rock Paper Scissors</h1>

    <div>
        <button onclick="playGame('rock')" title="Rock">👊</button>

        <button onclick="playGame('paper')" title="Paper">✋</button>

        <button onclick="playGame('scissors')" title="Scissors">✌️</button>
    </div>

    <p id="scores"></p>

    <button onclick="resetGame()" title="Reset Game" class="reset">Reset Game</button>



    <script src="app.js"></script>
</body>

</html>
